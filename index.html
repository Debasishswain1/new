<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color palet generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Color Palette Generator</h1>
        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Palette
        </button>
        <div class="palette-container">
            <!-- color box 1 -->
             <div class="color-box">
                <div class="color" style="background-color: #e1f5f1;"></div>
                <div class="color-info">
                    <span class="hex-value">#e1f5f1</span>
                    <i class="far fa-copy copy-btn" title="copy to clipborad"></i>
                </div>
             </div>
                <!-- color box 2 -->
             <div class="color-box">
                <div class="color" style="background-color: #ff3700;"></div>
                <div class="color-info">
                    <span class="hex-value">#ff3700</span>
                    <i class="far fa-copy copy-btn" title="copy to clipborad"></i>
                </div>
             </div>
            
            <!-- color box 3 -->
             <div class="color-box">
                <div class="color" style="background-color: #341cce;"></div>
                <div class="color-info">
                    <span class="hex-value">#341cce</span>
                    <i class="far fa-copy copy-btn" title="copy to clipborad"></i>
                </div>
             </div>
            
            <!-- color box 4 -->
             <div class="color-box">
                <div class="color" style="background-color: #51e810;"></div>
                <div class="color-info">
                    <span class="hex-value">#51e810</span>
                    <i class="far fa-copy copy-btn" title="copy to clipborad"></i>
                </div>
             </div>
            
            <!-- color box 5 -->
             <div class="color-box">
                <div class="color" style="background-color: #d0c311;"></div>
                <div class="color-info">
                    <span class="hex-value">#d0c311</span>
                    <i class="far fa-copy copy-btn" title="copy to clipborad"></i>
                </div>
             </div>
            
        </div>
    </div>
</div>
    
    <script src="script.js"></script>
</body>
</html>
